spring:
  application:
    name: codecard
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/codecard}
    username: ${DB_USER:codecard}
    password: ${DB_PASSWORD:codecard}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SMTP_HOST:smtp.resend.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:}
  access-expiration-ms: 900000
  refresh-expiration-ms: 2592000000

server:
  port: ${PORT:8080}
