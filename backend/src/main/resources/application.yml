spring:
  application:
    name: codecard
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:ZGV2LWp3dC1zZWNyZXQtZm9yLWxvY2FsLWRldi1vbmx5LW5vdC1mb3ItcHJvZHVjdGlvbg==}
  access-expiration-ms: 900000
  refresh-expiration-ms: 2592000000

cors:
  allowed-origins:
    - http://localhost:8081
    - http://localhost:19006

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  pattern:
    console: '{"ts":"%d{ISO8601}","level":"%level","traceId":"%X{traceId:-}","logger":"%logger{36}","msg":"%msg"}%n'
  level:
    com.codecard: INFO

rate-limit:
  enabled: true
  paths:
    - path: /api/v1/auth/login
      limit: 10
      duration-seconds: 60
    - path: /api/v1/auth/register
      limit: 3
      duration-seconds: 60
    - path: /api/v1/auth/send-otp
      limit: 3
      duration-seconds: 60
    - path: /api/v1/auth/verify-otp
      limit: 5
      duration-seconds: 60

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
