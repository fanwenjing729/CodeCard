spring:
  application:
    name: codecard
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/codecard}
    username: ${DB_USER:codecard}
    password: ${DB_PASSWORD:codecard}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${SMTP_HOST:smtp.resend.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:}
  access-expiration-ms: 900000
  refresh-expiration-ms: 2592000000

cors:
  allowed-origins:
    - http://localhost:8081
    - http://localhost:19006

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  pattern:
    console: '{"ts":"%d{ISO8601}","level":"%level","traceId":"%X{traceId:-}","logger":"%logger{36}","msg":"%msg"}%n'
  level:
    com.codecard: INFO

rate-limit:
  enabled: true
  paths:
    - path: /api/v1/auth/login
      limit: 10
      duration-seconds: 60
    - path: /api/v1/auth/register
      limit: 3
      duration-seconds: 60
    - path: /api/v1/auth/send-otp
      limit: 3
      duration-seconds: 60
    - path: /api/v1/auth/verify-otp
      limit: 5
      duration-seconds: 60
