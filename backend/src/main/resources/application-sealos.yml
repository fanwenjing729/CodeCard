# profile: sealos
# 切换方式: SPRING_PROFILES_ACTIVE=sealos
# 需要的环境变量:
#   DB_URL      — jdbc:postgresql://<sealos-host>:<port>/codecard
#   DB_USER     — 数据库用户名
#   DB_PASSWORD — 数据库密码
#   JWT_SECRET  — JWT 签名密钥 (生产环境必须更换)
#   SMTP_USER   — 邮件服务用户名
#   SMTP_PASS   — 邮件服务密码

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: ${SMTP_HOST:smtp.resend.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  health:
    mail:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
